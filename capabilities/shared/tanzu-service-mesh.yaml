naftiko: "1.0.0-alpha1"

info:
  label: "VMware Tanzu Service Mesh API"
  description: >-
    Shared definition for the VMware Tanzu Service Mesh REST API. Provides
    cluster management, global namespace operations, and resource group
    configuration for multi-cluster Kubernetes service mesh management.
  tags:
    - VMware Tanzu
    - Clusters
    - Global Namespaces
    - Kubernetes
    - Service Mesh
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TANZU_CSP_API_TOKEN: TANZU_CSP_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: tanzu-tsm
      baseUri: https://prod-2.nsxservicemesh.vmware.com
      description: "VMware Tanzu Service Mesh REST API."
      authentication:
        type: apikey
        key: csp-auth-token
        value: "{{TANZU_CSP_API_TOKEN}}"
        placement: header
      resources:
        - name: clusters
          path: /v1alpha1/clusters
          description: "Cluster management."
          operations:
            - name: list-clusters
              method: GET
              description: "List all clusters onboarded to Tanzu Service Mesh."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: cluster-detail
          path: /v1alpha1/clusters/{cluster_name}
          description: "Individual cluster operations."
          operations:
            - name: get-cluster
              method: GET
              description: "Get cluster details."
              inputParameters:
                - name: cluster_name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: onboard-cluster
              method: PUT
              description: "Onboard a Kubernetes cluster to TSM."
              inputParameters:
                - name: cluster_name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  display_name: "{{tools.display_name}}"
                  description: "{{tools.description}}"

            - name: remove-cluster
              method: DELETE
              description: "Remove a cluster from TSM."
              inputParameters:
                - name: cluster_name
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: global-namespaces
          path: /v1alpha1/global-namespaces
          description: "Global namespace management."
          operations:
            - name: list-global-namespaces
              method: GET
              description: "List all global namespaces."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-global-namespace
              method: POST
              description: "Create a global namespace spanning multiple clusters."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  domain_name: "{{tools.domain_name}}"
                  mtls_enforced: "{{tools.mtls_enforced}}"

        - name: global-namespace-detail
          path: /v1alpha1/global-namespaces/{namespace_id}
          description: "Individual global namespace."
          operations:
            - name: get-global-namespace
              method: GET
              description: "Get global namespace details."
              inputParameters:
                - name: namespace_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-global-namespace
              method: DELETE
              description: "Delete a global namespace."
              inputParameters:
                - name: namespace_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: resource-groups
          path: /v1alpha1/resource-groups
          description: "Resource group management."
          operations:
            - name: list-resource-groups
              method: GET
              description: "List resource groups."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-resource-group
              method: POST
              description: "Create a resource group."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  resource_type: "{{tools.resource_type}}"

  exposes:
    - type: rest
      port: 8100
      namespace: tanzu-tsm-rest
      resources:
        - path: /v1/clusters
          name: clusters
          operations:
            - method: GET
              name: list-clusters
              call: "tanzu-tsm.list-clusters"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/global-namespaces
          name: global-namespaces
          operations:
            - method: GET
              name: list-global-namespaces
              call: "tanzu-tsm.list-global-namespaces"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tanzu-tsm-mcp
      transport: http
      tools:
        - name: list-tsm-clusters
          description: "List Kubernetes clusters onboarded to Tanzu Service Mesh."
          hints:
            readOnly: true
            idempotent: true
          call: "tanzu-tsm.list-clusters"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-tsm-cluster
          description: "Get details for a specific TSM cluster."
          hints:
            readOnly: true
            idempotent: true
          call: "tanzu-tsm.get-cluster"
          with:
            cluster_name: "tools.cluster_name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: onboard-cluster-to-tsm
          description: "Onboard a Kubernetes cluster to Tanzu Service Mesh."
          hints:
            readOnly: false
            idempotent: true
          call: "tanzu-tsm.onboard-cluster"
          with:
            cluster_name: "tools.cluster_name"
            display_name: "tools.display_name"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-global-namespaces
          description: "List all global namespaces in Tanzu Service Mesh."
          hints:
            readOnly: true
            idempotent: true
          call: "tanzu-tsm.list-global-namespaces"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-global-namespace
          description: "Create a global namespace to connect workloads across clusters."
          hints:
            readOnly: false
            idempotent: false
          call: "tanzu-tsm.create-global-namespace"
          with:
            name: "tools.name"
            domain_name: "tools.domain_name"
            mtls_enforced: "tools.mtls_enforced"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-resource-groups
          description: "List resource groups for policy enforcement."
          hints:
            readOnly: true
            idempotent: true
          call: "tanzu-tsm.list-resource-groups"
          outputParameters:
            - type: object
              mapping: "$."
