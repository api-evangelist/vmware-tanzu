- aid: vmware-tanzu:tanzu-kubernetes-grid-api
  name: VMware Tanzu Kubernetes Grid API
  description: Kubernetes-native API for provisioning and managing Tanzu Kubernetes clusters using the TanzuKubernetesCluster
    CRD (v1alpha1/v1alpha2). Runs on vSphere Supervisor clusters via the Tanzu Kubernetes Grid Service.
  humanURL: https://docs.vmware.com/en/VMware-vSphere/index.html
