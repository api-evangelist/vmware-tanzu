apis:
- aid: vmware-tanzu:tanzu-service-mesh-api
  name: VMware Tanzu Service Mesh API
  description: The Tanzu Service Mesh REST API provides programmatic access to manage clusters, global namespaces, resource
    groups, and service mesh policies. Authentication uses a CSP API token exchanged for a short-lived Bearer token. The API
    version is embedded in the URL path (e.g. /v1alpha1/).
  humanURL: https://docs.vmware.com/en/VMware-Tanzu-Service-Mesh/index.html
