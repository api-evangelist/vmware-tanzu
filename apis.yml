aid: vmware-tanzu
name: VMware Tanzu
description: VMware Tanzu (now part of Broadcom) is a portfolio of products for modernizing applications and infrastructure
  with a common approach to building, running, and managing Kubernetes across multi-cloud environments. Key APIs include the
  Tanzu Service Mesh REST API for cluster and global namespace management, Kubernetes CRD-based APIs for VM Operator, Projects
  Operator, and NSX Operator, and the Tanzu CLI plugin runtime.
